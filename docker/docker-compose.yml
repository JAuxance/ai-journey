services:
  jupyter:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ai-journey
    working_dir: /workspace
    ports:
      - "8888:8888"
    volumes:
      - ..:/workspace
    environment:
      PYTHONPATH: /workspace
    tty: true
    stdin_open: true
    restart: unless-stopped

  pipeline:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ai-journey-pipeline
    volumes:
      - ..:/workspace
    working_dir: /workspace/04-projects/01-student-performance-predictor
    environment:
      PYTHONPATH: /workspace
    command: python src/main.py
    profiles:
      - pipeline

  tests:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ai-journey-tests
    volumes:
      - ..:/workspace
    working_dir: /workspace
    environment:
      PYTHONPATH: /workspace
    command: pytest
    profiles:
      - test
